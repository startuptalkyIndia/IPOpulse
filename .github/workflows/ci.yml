# Standard TalkyTools CI workflow
# Drop into .github/workflows/ci.yml in each project.
# Runs on every push + PR to main.

name: CI

on:
  workflow_dispatch:  # manual only — saves GitHub Actions minutes


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: TypeScript check
        run: npx tsc --noEmit

        continue-on-error: true
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        continue-on-error: true

      - name: Test (if test script exists)
        run: npm test --if-present

        continue-on-error: true
