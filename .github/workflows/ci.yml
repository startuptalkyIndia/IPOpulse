# TalkyTools CI — runs on every push + PR to main.
# Audit HIGH: was workflow_dispatch-only with continue-on-error on every step, so
# it never actually ran or failed. TypeScript + tests are now hard gates.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true # style warnings shouldn't block a merge

      # Hard gates — these must pass.
      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Test
        run: npm test --if-present

      # Build is best-effort in CI (no real DB / full secret set).
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        continue-on-error: true
