services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ipopulse
      POSTGRES_USER: ipopulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipopulse"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Postgres tier per _shared/templates/docker-compose.template.yml
    mem_limit: 1g
    memswap_limit: 1500m
    cpus: 1.0

  ipopulse:
    build: .
    restart: always
    ports:
      - "3065:3065"
    env_file: .env
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      - DATABASE_URL=postgresql://ipopulse:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ipopulse
    volumes:
      # Mount ~/.claude from the host so the Claude CLI (installed in Docker)
      # can authenticate using the founder's existing Claude subscription.
      # Server runs as ubuntu user → auth lives at /home/ubuntu/.claude
      # Container runs as root → mount it to /root/.claude
      - /home/ubuntu/.claude:/root/.claude:ro
    depends_on:
      postgres:
        condition: service_healthy
    # Heavy app tier per _shared/templates/docker-compose.template.yml — IPOpulse runs
    # BSE/NSE/AMFI/NSDL/SEBI cron crawlers, dynamic OG image generation via @vercel/og,
    # Anthropic SDK calls / Claude CLI (DRHP search), and Recharts SSR.
    mem_limit: 2g
    memswap_limit: 3g
    cpus: 2.0

volumes:
  pgdata:
