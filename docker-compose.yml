services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ipopulse
      POSTGRES_USER: ipopulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipopulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  ipopulse:
    build: .
    ports:
      - "3065:3065"
    env_file: .env
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      - DATABASE_URL=postgresql://ipopulse:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ipopulse
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
