services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ipopulse
      POSTGRES_USER: ipopulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipopulse"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Postgres tier per _shared/templates/docker-compose.template.yml
    mem_limit: 1g
    memswap_limit: 1500m
    cpus: 1.0

  ipopulse:
    build: .
    restart: always
    ports:
      - "3065:3065"
    env_file: .env
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      - DATABASE_URL=postgresql://ipopulse:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ipopulse
    volumes:
      # Mount Claude CLI binary + auth from host into container.
      # Host (ubuntu user): binary at /usr/bin/claude, auth at /home/ubuntu/.claude
      # Container (root): binary at /usr/local/bin/claude, auth at /root/.claude
      # This activates DRHP AI, Concall AI, market summary — no ANTHROPIC_API_KEY needed.
      - /usr/lib/node_modules/@anthropic-ai/claude-code/bin/claude.exe:/usr/local/bin/claude:ro
      - /home/ubuntu/.claude:/root/.claude:rw
    depends_on:
      postgres:
        condition: service_healthy
    # Heavy app tier per _shared/templates/docker-compose.template.yml — IPOpulse runs
    # BSE/NSE/AMFI/NSDL/SEBI cron crawlers, dynamic OG image generation via @vercel/og,
    # Anthropic SDK calls / Claude CLI (DRHP search), and Recharts SSR.
    mem_limit: 2g
    memswap_limit: 3g
    cpus: 2.0

volumes:
  pgdata:
