# Local dev database only — Next.js runs on host via `npm run dev`
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ipopulse
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5448:5432"
    volumes:
      - dev-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d ipopulse"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev-db:
